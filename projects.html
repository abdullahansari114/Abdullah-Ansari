    <style>
        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
        }

        .project-link {
            display: block;
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .project-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .project-link:hover img {
            transform: scale(1.1);
            cursor: pointer;
        }

        .project-img {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.2), rgba(75, 0, 130, 0.2));
        }

        .project-content {
            padding: 25px;
        }

        .project-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }
    </style>
</head>
